services:
  # Base de datos donde se guardan las cosas
  postgres:
    image: pgvector/pgvector:pg16
    container_name: multimodal-db-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mmdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mmdb}
      POSTGRES_DB: ${POSTGRES_DB:-multimodal}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      # Estos scripts solo corren la primera vez que arranca vacío
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mmdb} -d ${POSTGRES_DB:-multimodal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mmdb-net
    restart: unless-stopped

  # Servidor que recibe las consultas y atiende los archivos
  backend:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: multimodal-db-backend
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      # Elige dónde se guardan los datos, en archivos o en postgres
      # Por defecto usa postgres y así el estado sobrevive a los reinicios
      STORAGE_BACKEND: ${STORAGE_BACKEND:-postgres}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-mmdb}:${POSTGRES_PASSWORD:-mmdb}@postgres:5432/${POSTGRES_DB:-multimodal}
    ports:
      - "8000:8000"
    volumes:
      # Comparte el código para no reconstruir en cada cambio
      - ./multimodal-db:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mmdb-net
    restart: unless-stopped

  # La página web que ve el usuario
  frontend:
    build:
      context: ./multimodal-db/frontend
      dockerfile: ../../docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: multimodal-db-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mmdb-net
    restart: unless-stopped

networks:
  mmdb-net:
    driver: bridge

volumes:
  pg-data:
